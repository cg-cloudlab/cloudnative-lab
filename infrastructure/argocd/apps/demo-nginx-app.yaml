apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/cg-cloudlab/cloudnative-lab.git
    targetRevision: main
    path: apps/demo-nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
