apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-nginx
  namespace: default
spec:
  ingressClassName: nginx

  tls:
  - hosts:
    - demo.local
    secretName: demo-nginx-tls

  rules:
  - host: demo.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: demo-nginx
            port:
              number: 80
